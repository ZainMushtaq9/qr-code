{% set tool_emoji = "📄" %}{% set tool_type = "pdf" %}
{% extends "tools/tool_base.html" %}
{% block tool_form %}
<div class="step-label">
    <span class="step-number">1</span>
    <span class="step-text">PDF or File Link</span>
</div>
<div class="form-group">
    <label>File URL *</label>
    <input type="url" class="form-control" id="fileUrl" placeholder="https://drive.google.com/file/d/..." required>
    <div class="form-hint">Google Drive, Dropbox, or any direct link to your PDF / document</div>
</div>
{% endblock %}
{% block tool_script %}
<script>
    function generateQR() {
        const url = document.getElementById('fileUrl').value.trim();
        if (!url) { showToast('⚠️ Enter file URL'); return; }
        postQR('/generate-pdf-qr', { file_url: url, ...getColors() });
    }
</script>
{% endblock %}
