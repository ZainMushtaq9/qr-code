{% set tool_emoji = "🌐" %}{% set tool_type = "url" %}
{% extends "tools/tool_base.html" %}
{% block tool_form %}
<div class="step-label">
    <span class="step-number">1</span>
    <span class="step-text">Enter Website URL</span>
</div>
<div class="form-group">
    <input type="url" class="form-control" id="urlInput" placeholder="https://www.example.com" required>
    <div class="form-hint">Any website link — YouTube, Facebook, your business website, etc.</div>
</div>
{% endblock %}
{% block tool_script %}
<script>
    function generateQR() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) { showToast('⚠️ Please enter a URL'); return; }
        postQR('/generate-url-qr', { url, ...getColors() });
    }
</script>
{% endblock %}
